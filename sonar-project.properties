# SonarQube Cloud — análisis estático de Sistema C (BFF NestJS)
# Repo propio: AngelDavidStudios/AuthSystem-NestJS (01-AuthSystem/ es la raíz).
# Ajusta projectKey/organization a los valores que te dé SonarCloud al crear el proyecto.

sonar.projectKey=AngelDavidStudios_AuthSystem-NestJS
sonar.organization=angeldavidstudios

# --- Qué analiza ---
sonar.sources=src
sonar.tests=test

# --- Qué ignora (build outputs, bundle, mapas, configs sin lógica) ---
sonar.exclusions=dist/**,lambda-bundle/**,node_modules/**,coverage/**,**/*.spec.ts,**/*.e2e-spec.ts

# Excluye del cálculo de cobertura los tests y el código sin lógica testeable:
# bootstrap (main/lambda/app.setup), wiring de NestJS (*.module.ts), DTOs,
# definiciones de tipos, decorators y el schema de config (Zod, declarativo).
# Deben coincidir con `collectCoverageFrom` en package.json (jest) para que
# el denominador de Sonar y el del LCOV sean el mismo conjunto de archivos.
sonar.coverage.exclusions=test/**,**/*.spec.ts,**/*.e2e-spec.ts,src/main.ts,src/lambda.ts,src/app.setup.ts,**/*.module.ts,**/dto/**,**/*.types.ts,**/decorators/**,src/config/env.schema.ts,src/config/env.validation.ts

# --- Cobertura (LCOV generado por `pnpm run test:cov`) ---
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Quality Gate bloqueante ---
# Espera el veredicto del Quality Gate y falla el job (y por ende el deploy)
# si no pasa. Quitar/poner en false para volver a modo informativo.
sonar.qualitygate.wait=true

# --- Misc ---
sonar.sourceEncoding=UTF-8
