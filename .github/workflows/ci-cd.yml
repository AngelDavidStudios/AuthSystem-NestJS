name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run build

  test-unit:
    name: Tests unitarios
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run test

  test-e2e:
    name: Tests e2e
    needs: test-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run test:e2e

  deploy:
    name: Deploy a AWS Lambda
    needs: test-e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # requerido para el OIDC con AWS
      contents: read
    env:
      AWS_REGION: us-east-1
      FUNCTION_NAME: authsystem-c
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # Bundlea con esbuild en un solo archivo (lambda-bundle/index.js, ~3MB).
      # El AWS SDK v3 se externaliza (el runtime de Lambda ya lo trae), así no
      # se empaqueta node_modules (que excedía el límite de 250MB de Lambda).
      - name: Build + bundle para Lambda
        run: pnpm run build:lambda

      - name: Empaquetar function.zip
        run: cd lambda-bundle && zip -rq ../function.zip . && cd ..

      # OIDC: asume el rol IAM y obtiene credenciales temporales (sin llaves).
      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Actualizar código de la Lambda
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://function.zip \
            --publish
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"
